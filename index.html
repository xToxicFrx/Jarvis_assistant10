  <!-- ===== LOGIN ===== -->
  <div id="login" class="login">
    <div class="login-card">
      <div class="login-mark"><svg class="icon"><use href="#i-spark"/></svg></div>
      <h1>Jarvis</h1>
      <p class="muted">Dein persoenlicher Planungs-Assistent</p>
      <input id="pw" type="password" placeholder="Passwort" autocomplete="current-password" />
      <button id="loginBtn" class="btn btn-primary btn-block" type="button">Entsperren</button>
      <span id="loginErr" class="err"></span>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="brand"><span class="brand-mark"><svg class="icon"><use href="#i-spark"/></svg></span><span class="brand-name">Jarvis</span></div>
      <div class="topbar-right">
        <span id="weather" class="weather-chip" title="Wetter"></span>
        <span class="clock"><span id="clock">--:--</span><span id="today" class="muted"></span></span>
        <button id="searchBtn" class="icon-btn" type="button" title="Suche / Befehle (Strg+K)"><svg class="icon"><use href="#i-search"/></svg></button>
        <button id="themeBtn" class="icon-btn" type="button" title="Hell/Dunkel"><svg class="icon"><use href="#i-moon"/></svg></button>
        <button id="settingsBtn" class="icon-btn" type="button" title="Einstellungen"><svg class="icon"><use href="#i-settings"/></svg></button>
      </div>
    </header>

    <main id="dashboard" class="dashboard"></main>

    <div id="orbWrap" class="orb-wrap"><canvas id="orb" class="orb" width="150" height="150"></canvas></div>

    <section class="assistant">
      <div class="assistant-inner">
        <div id="transcript" class="transcript muted">Sag "Jarvis" oder tippe etwas...</div>
        <div class="assistant-row">
          <span id="voiceState" class="voice-state" data-state="idle" title="Status"><span class="dot"></span></span>
          <input id="textInput" type="text" placeholder="Schreib oder sprich mit Jarvis..." autocomplete="off" />
          <button id="sendBtn" class="icon-btn" type="button" title="Senden"><svg class="icon"><use href="#i-send"/></svg></button>
          <button id="micBtn" class="icon-btn" type="button" title="Halten zum Sprechen (oder Leertaste)"><svg class="icon"><use href="#i-mic"/></svg></button>
          <button id="wakeBtn" class="icon-btn" type="button" title="Wake-Word: sag 'Jarvis'"><svg class="icon"><use href="#i-wake"/></svg></button>
          <button id="resetBtn" class="icon-btn" type="button" title="Gespraech zuruecksetzen"><svg class="icon"><use href="#i-trash"/></svg></button>
        </div>
      </div>
    </section>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root"></div>
