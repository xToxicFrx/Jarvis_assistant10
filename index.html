  <!-- ===== LOGIN ===== -->
  <div id="login" class="login">
    <div class="login-card">
      <div class="login-mark"><svg class="icon"><use href="#i-spark"/></svg></div>
      <h1>Jarvis</h1>
      <p class="muted">Dein persoenlicher Planungs-Assistent</p>
      <input id="pw" type="password" placeholder="Passwort" autocomplete="current-password" />
      <button id="loginBtn" class="btn btn-primary btn-block">Entsperren</button>
      <span id="loginErr" class="err"></span>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark"><svg class="icon"><use href="#i-spark"/></svg></span>
        <span class="brand-name">Jarvis</span>
      </div>
      <div class="topbar-right">
        <span id="weather" class="weather-chip" title="Wetter"></span>
        <span class="clock"><span id="clock">--:--</span><span id="today" class="muted"></span></span>
        <button id="themeBtn" class="icon-btn" title="Hell/Dunkel"><svg class="icon"><use href="#i-moon"/></svg></button>
        <button id="settingsBtn" class="icon-btn" title="Einstellungen"><svg class="icon"><use href="#i-settings"/></svg></button>
      </div>
    </header>

    <main id="dashboard" class="dashboard"><!-- von ui.js gefuellt --></main>

    <!-- Assistent / Stimme -->
    <section class="assistant">
      <div class="assistant-inner">
        <div id="transcript" class="transcript muted">Sag "Jarvis" oder tippe etwas...</div>
        <div class="assistant-row">
          <span id="voiceState" class="voice-state" data-state="idle" title="Status"><span class="dot"></span></span>
          <input id="textInput" type="text" placeholder="Schreib oder sprich mit Jarvis..." autocomplete="off" />
          <button id="sendBtn" class="icon-btn" title="Senden"><svg class="icon"><use href="#i-send"/></svg></button>
          <button id="micBtn" class="icon-btn" title="Halten zum Sprechen (oder Leertaste)"><svg class="icon"><use href="#i-mic"/></svg></button>
          <button id="wakeBtn" class="icon-btn" title="Wake-Word: sag 'Jarvis'"><svg class="icon"><use href="#i-wake"/></svg></button>
          <button id="resetBtn" class="icon-btn" title="Gespraech zuruecksetzen"><svg class="icon"><use href="#i-trash"/></svg></button>
        </div>
      </div>
    </section>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot" class="toast-root"></div>

  <script src="/js/store.js"></script>
  <script src="/js/reminders.js"></script>
  <script src="/js/tools.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
